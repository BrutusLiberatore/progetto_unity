# Server
server.port=3001

# Database PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/boltbonedb
spring.datasource.username=postgres
spring.datasource.password=kratos

# SQL init (disabled after first run)
spring.sql.init.mode=never
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=your-super-secret-key-change-in-production
jwt.expiration=604800000

# Stripe
stripe.api.key=${STRIPE_SECRET_KEY:sk_test_your_key_here}
stripe.secret.key=${STRIPE_PUBLISHABLE_KEY:pk_test_your_key_here}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_secret}

# Brevo
brevo.api.key=${BREVO_API_KEY:your_brevo_key_here}
brevo.from.email=boltbone26@gmail.com
brevo.from.name=Bolt & Bone

# Frontend
frontend.url=http://localhost:5173

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.gameshop=DEBUG